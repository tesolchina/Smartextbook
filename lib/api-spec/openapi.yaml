openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: lessons
    description: Lesson generation
  - name: content
    description: Content fetching utilities
  - name: sharing
    description: Lesson sharing (public links)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /fetch-url:
    post:
      operationId: fetchUrl
      tags: [content]
      summary: Fetch readable text content from a URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchUrlBody"
      responses:
        "200":
          description: Extracted text content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchUrlResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Could not extract content from URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /generate-lesson:
    post:
      operationId: generateLesson
      tags: [lessons]
      summary: Generate a lesson from chapter text using AI (synchronous)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateLessonBody"
      responses:
        "200":
          description: Generated lesson content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedLesson"
        "400":
          description: Bad request or invalid LLM config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: AI provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /generate-mindmap:
    post:
      operationId: generateMindmap
      tags: [lessons]
      summary: Generate a Mermaid mind map diagram for a lesson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateMindmapBody"
      responses:
        "200":
          description: Mermaid mindmap definition string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateMindmapResponse"
        "400":
          description: Bad request or invalid LLM config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: AI provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /share:
    post:
      operationId: shareLesson
      tags: [sharing]
      summary: Create a public shareable link for a lesson (valid 90 days)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareLessonBody"
      responses:
        "200":
          description: Share link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLessonResponse"
        "400":
          description: Invalid lesson data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /shared/{id}:
    get:
      operationId: getSharedLesson
      tags: [sharing]
      summary: Retrieve a shared lesson by its share ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The share ID returned by POST /share
      responses:
        "200":
          description: Shared lesson data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedLessonResponse"
        "404":
          description: Shared lesson not found or has expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /chat:
    post:
      operationId: chatWithTutor
      tags: [lessons]
      summary: Chat with the AI tutor (SSE streaming, stateless)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: SSE stream of AI tutor response
          content:
            text/event-stream: {}
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    LlmConfig:
      type: object
      description: LLM provider configuration supplied by the user (BYOK)
      properties:
        provider:
          type: string
          description: Provider identifier (e.g. openai, gemini, deepseek, openrouter, groq, mistral, together, minimax, custom)
        apiKey:
          type: string
          description: API key for the provider
        model:
          type: string
          description: Model name to use
        baseUrl:
          type: string
          description: Optional custom base URL (required for provider=custom)
      required:
        - provider
        - apiKey
        - model
    FetchUrlBody:
      type: object
      properties:
        url:
          type: string
          format: uri
      required:
        - url
    FetchUrlResponse:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        url:
          type: string
      required:
        - title
        - content
        - url
    GenerateLessonBody:
      type: object
      properties:
        title:
          type: string
        chapterText:
          type: string
        llmConfig:
          $ref: "#/components/schemas/LlmConfig"
      required:
        - title
        - chapterText
        - llmConfig
    GeneratedLesson:
      type: object
      properties:
        summary:
          type: string
        keyConcepts:
          type: array
          items:
            $ref: "#/components/schemas/KeyConcept"
        quizQuestions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
      required:
        - summary
        - keyConcepts
        - quizQuestions
    KeyConcept:
      type: object
      properties:
        term:
          type: string
        definition:
          type: string
      required:
        - term
        - definition
    QuizQuestion:
      type: object
      properties:
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correctIndex:
          type: integer
        explanation:
          type: string
      required:
        - question
        - options
        - correctIndex
        - explanation
    LessonContext:
      type: object
      description: Lesson context sent by the client for stateless chat
      properties:
        title:
          type: string
        summary:
          type: string
        keyConcepts:
          type: array
          items:
            $ref: "#/components/schemas/KeyConcept"
        chapterText:
          type: string
      required:
        - title
        - summary
        - keyConcepts
        - chapterText
    ChatHistoryMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content
    ChatRequest:
      type: object
      properties:
        message:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatHistoryMessage"
        lessonContext:
          $ref: "#/components/schemas/LessonContext"
        llmConfig:
          $ref: "#/components/schemas/LlmConfig"
      required:
        - message
        - history
        - lessonContext
        - llmConfig
    GenerateMindmapBody:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
        keyConcepts:
          type: array
          items:
            $ref: "#/components/schemas/KeyConcept"
        llmConfig:
          $ref: "#/components/schemas/LlmConfig"
      required:
        - title
        - summary
        - keyConcepts
        - llmConfig
    GenerateMindmapResponse:
      type: object
      properties:
        mermaid:
          type: string
          description: Mermaid mindmap definition string (starts with "mindmap")
      required:
        - mermaid
    ShareLessonBody:
      type: object
      properties:
        lesson:
          type: object
          description: The full lesson object to publish
          properties:
            id:
              type: string
            title:
              type: string
            summary:
              type: string
            keyConcepts:
              type: array
              items: {}
            quizQuestions:
              type: array
              items: {}
            chapterText:
              type: string
          required:
            - id
            - title
            - summary
            - keyConcepts
            - quizQuestions
            - chapterText
      required:
        - lesson
    ShareLessonResponse:
      type: object
      properties:
        shareId:
          type: string
          description: Unique share identifier
        shareUrl:
          type: string
          format: uri
          description: Full public URL of the shared lesson (e.g. https://smartextbook.replit.app/shared/abc123)
        expiresAt:
          type: string
          format: date-time
          description: ISO 8601 expiry date (90 days from creation)
      required:
        - shareId
        - shareUrl
        - expiresAt
    SharedLessonResponse:
      type: object
      properties:
        lesson:
          type: object
          description: The stored lesson data
        title:
          type: string
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - lesson
        - title
        - expiresAt
        - createdAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
